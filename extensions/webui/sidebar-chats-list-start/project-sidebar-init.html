<html>

<head>
  <script type="module">
    import { store } from "/plugins/project_sidebar/webui/project-sidebar-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.projectSidebar && $store.chats">
      <div class="project-sidebar-container" x-init="$store.projectSidebar.init()">

        <!-- Header row: title + new chat button -->
        <div class="section-header-row">
          <h3 class="section-header">Projects</h3>
          <button id="newChatProjectSidebar" class="btn-icon-action chat-list-action-btn"
            @click="$store.projectSidebar.newChat()"
            aria-label="New Chat" title="New Chat">
            <span class="material-symbols-outlined">chat_add_on</span>
          </button>
        </div>

        <!-- Project groups list -->
        <ul class="config-list project-sidebar-list no-scrollbar"
          x-show="$store.chats.contexts.length > 0">

          <template x-for="group in $store.projectSidebar.getProjectGroups()" :key="group.key">
            <li class="project-group" :class="{'project-group-active': $store.projectSidebar.isActiveGroup(group)}" :data-project-name="group.name">

              <!-- Project header (collapsible) -->
              <div class="project-group-header"
                @click="$store.projectSidebar.toggleCollapse(group.key)">
                <div class="project-group-header-left">
                  <span class="material-symbols-outlined project-chevron"
                    :class="{ 'chevron-collapsed': $store.projectSidebar.isCollapsed(group.key) }">
                    expand_more
                  </span>
                  <span class="project-color-indicator"
                    :style="group.color ? { backgroundColor: group.color } : { border: '1px solid var(--color-border)' }"></span>
                  <span class="project-group-title" x-text="group.title"></span>
                  <span class="project-chat-count" x-text="'(' + group.chats.length + ')'"></span>
                </div>
                <div class="project-group-header-actions">
                  <!-- Status indicators — only shown when group is collapsed (marklet handles per-chat dots when expanded) -->
                  <span class="psb-running-dot"
                    x-show="$store.projectSidebar.isCollapsed(group.key) && $store.projectSidebar.hasRunningChat(group)"
                    title="Running"></span>
                  <span class="psb-unseen-dot"
                    x-show="$store.projectSidebar.isCollapsed(group.key) && $store.projectSidebar.hasFinishedUnseenChat(group)"
                    title="Finished (unseen)"></span>
                  <!-- New chat in project button (only for real projects) -->
                  <button class="btn-icon-action project-new-chat-btn"
                    x-show="!$store.projectSidebar.isTouchDevice() || $store.projectSidebar.isActiveGroup(group)"
                    @click.stop="$store.projectSidebar.newChatInProject(group)"
                    title="New chat in project" aria-label="New chat in project">
                    <span class="material-symbols-outlined">add_comment</span>
                  </button>
                  <!-- Edit project button (only for real projects) -->
                  <button class="btn-icon-action project-edit-btn"
                    x-show="group.key !== $store.projectSidebar.NO_PROJECT_KEY && (!$store.projectSidebar.isTouchDevice() || $store.projectSidebar.isActiveGroup(group))"
                    @click.stop="$store.projectSidebar.editProject(group.name)"
                    title="Edit project" aria-label="Edit project">
                    <span class="material-symbols-outlined">edit</span>
                  </button>
                </div>
              </div>

              <!-- Chat items within this project -->
              <ul class="project-group-chats"
                x-show="!$store.projectSidebar.isCollapsed(group.key)">
                <template x-for="context in group.chats" :key="context.id">
                  <li>
                    <div :class="{'chat-container': true, 'chat-selected': $store.projectSidebar.isSelected(context.id)}"
                      :data-chat-id="context.id"
                      :data-project-name="group.name"
                      @click="$store.projectSidebar.selectChat(context.id)">
                      <div class="chat-list-button">
                        <span class="chat-name"
                          x-text="context.name ? context.name : 'Chat #' + context.no"></span>
                      </div>
                      <!-- 3-dot more button — triggers store-managed global dropdown -->
                      <button class="btn-icon-action chat-list-action-btn chat-more-btn"
                        x-show="!$store.projectSidebar.isTouchDevice() || $store.projectSidebar.isActiveChat(context)"
                        title="More actions"
                        @pointerdown.stop.prevent="$store.projectSidebar.openChatMenu(context, $el)">
                        <span class="material-symbols-outlined">more_vert</span>
                      </button>
                    </div>
                  </li>
                </template>
              </ul>

            </li>
          </template>
        </ul>

        <!-- Empty state -->
        <div class="empty-list-message" x-show="$store.chats.contexts.length === 0">
          <p><i>No chats to list.</i></p>
        </div>

        <!-- Global chat-actions dropdown — single instance, store-managed position -->
        <div class="psb-chat-menu"
          x-show="$store.projectSidebar.openChatContext !== null"
          :style="$store.projectSidebar.chatMenuStyle"
          @click.stop>
          <template x-if="$store.projectSidebar.openChatContext !== null">
            <div>
              <template x-for="item in $store.projectSidebar.chatMenuItems" :key="item.label">
                <div style="display:contents">
                  <!-- Divider -->
                  <div x-show="item.divider" class="psb-menu-divider"></div>
                  <!-- Action button -->
                  <button
                    x-show="!item.divider && (!item.visible || item.visible($store.projectSidebar.openChatContext))"
                    class="chat-more-item"
                    :class="{ 'chat-more-item-danger': item.danger }"
                    @click.stop="
                      let ctx = $store.projectSidebar.openChatContext;
                      item.confirm
                        ? $confirmClick($event, () => { $store.projectSidebar.closeChatMenu(); item.action(ctx); })
                        : ($store.projectSidebar.closeChatMenu(), item.action(ctx))">
                    <span class="material-symbols-outlined" x-text="item.icon"></span>
                    <span x-text="item.label"></span>
                  </button>
                </div>
              </template>
            </div>
          </template>


      </div>
    </template>
  </div>

  <style>
    /* Status dot semantic color tokens — override these to re-theme */
    :root {
      --psb-running-color: #4361ee;
      --psb-unseen-color: #2a9d8f;
    }
    .light-mode {
      --psb-running-color: #2540b3;
      --psb-unseen-color: #1a6f65;
    }

    /* ================================================================
       HIDE DEFAULT CHATS LIST
       The original chats-list.html content is hidden; our view replaces it.
       We target the original component's elements specifically.
       ================================================================ */
    #chats-section > x-component[path*="chats-list"] > div > template + div > .section-header-row,
    #chats-section > x-component[path*="chats-list"] > div > template + div > .chats-config-list,
    #chats-section > x-component[path*="chats-list"] > div > template + div > .empty-list-message {
      display: none !important;
    }

    /* Also hide the original header row and list when the store renders */
    .chats-list-container > .section-header-row,
    .chats-list-container > .chats-config-list:not(.project-sidebar-list),
    .chats-list-container > .empty-list-message {
      display: none !important;
    }

    /* ================================================================
       PROJECT SIDEBAR CONTAINER
       ================================================================ */
    .project-sidebar-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-top: var(--spacing-md);
    }

    .project-sidebar-container .section-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      flex-shrink: 0;
      margin-bottom: var(--spacing-xs);
      z-index: 10;
    }

    .project-sidebar-container .section-header {
      margin: 0;
    }

    .project-sidebar-list {
      flex: 1;
      min-height: 0;
      overflow: scroll;
      scroll-behavior: smooth;
      max-height: 100%;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    /* ================================================================
       PROJECT GROUP
       Override .config-list li { display: flex } from index.css (specificity 0,1,1)
       We need higher specificity to force block/column layout.
       ================================================================ */
    .project-sidebar-list > li.project-group {
      display: block !important;
      align-items: initial;
      justify-content: initial;
      padding: 0;
      margin-bottom: 2px;
    }

    .project-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 6px 5px 0;
      cursor: pointer;
      border-radius: 4px;
      user-select: none;
      -webkit-user-select: none;
      min-height: 32px;
    }

    .project-group-header:hover {
      background-color: var(--color-background-hover);
    }

    .project-group-header-left {
      display: flex;
      align-items: center;
      gap: 4px;
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }

    .project-chevron {
      font-size: 16px;
      transition: transform 0.15s ease;
      flex-shrink: 0;
    }

    .chevron-collapsed {
      transform: rotate(-90deg);
    }

    .project-color-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .project-group-title {
      font-size: var(--font-size-small);
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--color-text);
    }

    .project-chat-count {
      font-size: 10px;
      color: var(--color-secondary);
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ================================================================
       PROJECT EDIT BUTTON (hover only on pointer devices)
       ================================================================ */
    .project-group-header-actions {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .project-edit-btn {
      width: 22px;
      height: 22px;
      min-width: 22px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .project-edit-btn .material-symbols-outlined {
      font-size: 14px;
    }

    .device-pointer .project-edit-btn {
      display: none;
    }

    .device-pointer .project-group-header:hover .project-edit-btn {
      display: inline-flex;
      opacity: 0.7;
    }

    .device-pointer .project-edit-btn:hover {
      opacity: 1 !important;
    }

    /* Touch devices: hide by default, show only for active project group */
    .device-touch .project-edit-btn {
      display: none;
    }
    .device-touch .project-group.project-group-active .project-edit-btn {
      display: inline-flex;
      opacity: 0.7;
    }
    @media (hover: none) and (pointer: coarse) {
      .project-edit-btn {
        display: none;
      }
      .project-group.project-group-active .project-edit-btn {
        display: inline-flex;
        opacity: 0.7;
      }
    }

    .project-new-chat-btn {
      width: 22px;
      height: 22px;
      min-width: 22px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .project-new-chat-btn .material-symbols-outlined {
      font-size: 14px;
    }

    .device-pointer .project-new-chat-btn {
      display: none;
    }

    .device-pointer .project-group-header:hover .project-new-chat-btn {
      display: inline-flex;
      opacity: 0.7;
    }

    .device-pointer .project-new-chat-btn:hover {
      opacity: 1 !important;
    }

    .device-touch .project-new-chat-btn {
      display: none;
    }
    .device-touch .project-group.project-group-active .project-new-chat-btn {
      display: inline-flex;
      opacity: 0.7;
    }
    @media (hover: none) and (pointer: coarse) {
      .project-new-chat-btn {
        display: none;
      }
      .project-group.project-group-active .project-new-chat-btn {
        display: inline-flex;
        opacity: 0.7;
      }
    }


    /* ================================================================
       PROJECT STATUS INDICATORS — matches chat_status_marklet plugin
       ================================================================ */
    .psb-running-dot,
    .psb-unseen-dot {
      display: inline-block;
      flex-shrink: 0;
      border-radius: 50%;
      width: 6px;
      height: 6px;
      margin-right: 4px;
    }

    /* Running: pulsing blue dot — same as .csm-running-dot */
    .psb-running-dot {
      background-color: var(--psb-running-color);
      box-shadow: 0 0 3px color-mix(in srgb, var(--psb-running-color) 60%, transparent);
      animation: csm-pulse 1.8s ease-in-out infinite;
    }

    /* Finished unseen: solid teal dot — same as .csm-unseen-dot */
    .psb-unseen-dot {
      background-color: var(--psb-unseen-color);
      box-shadow: 0 0 3px color-mix(in srgb, var(--psb-unseen-color) 50%, transparent);
    }


    /* ================================================================
       CHAT ITEMS WITHIN GROUPS
       ================================================================ */
    .project-group-chats {
      display: block;
      list-style: none;
      padding: 0;
      margin: 0 0 0 28px;
    }
    .project-group-chats .chat-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 24px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }

    .project-group-chats .chat-list-button {
      display: flex;
      align-items: center;
      flex-grow: 1;
      padding: 2px 6px;
      overflow: hidden;
      gap: 0.4em;
    }


    .project-group-chats .chat-container:hover {
      background-color: var(--color-background-hover);
    }

    .project-group-chats .chat-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: var(--font-size-small);
    }



    .project-group-chats .chat-list-action-btn {
      flex-shrink: 0;
      margin-right: 6px;
    }

    /* Selected chat accent */
    .project-group-chats .chat-selected {
      background-color: var(--color-background-hover);
      border-radius: 4px;
    }

    /* Hide all chat action buttons except .chat-more-btn.
       Must override chat_rename's !important rules (specificity 0,2,1) with
       higher specificity (0,3,2) + !important. */
    .project-group-chats .chat-container .chat-list-action-btn:not(.chat-more-btn) {
      display: none !important;
    }
    .project-group-chats .chat-container:hover .chat-list-action-btn:not(.chat-more-btn),
    .project-group-chats .chat-container:focus-within .chat-list-action-btn:not(.chat-more-btn) {
      display: none !important;
    }

    /* Always show the 3-dot menu button on touch devices (no hover) */
    @media (hover: none) and (pointer: coarse) {
      .project-group-chats .chat-container .chat-more-btn {
        display: inline-flex !important;
      }
    }
    .device-touch .project-group-chats .chat-container .chat-more-btn {
      display: inline-flex !important;
    }

    /* Mobile: chat_rename hides all .chat-list-action-btn and only restores
       its own .chat-more-actions-btn class. Our .chat-more-btn stays hidden.
       Show only on the selected chat, and keep it compact (chat_rename inflates
       mobile buttons to 36px/22px — we cap them at sidebar-header size).
       Override with higher specificity (0,4,1) > chat_rename's (0,3,1). */
    @media (hover: none) and (pointer: coarse) {
      body.device-pointer .project-group-chats .chat-container.chat-selected .chat-more-btn {
        display: inline-flex !important;
        width: 22px !important;
        height: 22px !important;
        min-width: 22px !important;
        margin-right: 4px !important;
      }
      body.device-pointer .project-group-chats .chat-container.chat-selected .chat-more-btn .material-symbols-outlined {
        font-size: 14px !important;
      }
    }
    .device-touch .project-group-chats .chat-container.chat-selected .chat-more-btn {
      display: inline-flex !important;
      width: 22px !important;
      height: 22px !important;
      min-width: 22px !important;
      margin-right: 4px !important;
    }
    .device-touch .project-group-chats .chat-container.chat-selected .chat-more-btn .material-symbols-outlined {
      font-size: 14px !important;
    }


    /* ================================================================
       CHAT MORE DROPDOWN (global fixed-position panel)
       ================================================================ */
    /* ================================================================
       CHAT MORE DROPDOWN (global fixed-position panel)
       ================================================================ */
    .psb-chat-menu {
      position: fixed;
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 4px;
      min-width: 140px;
      z-index: 9999;
      box-shadow: 0 4px 16px var(--color-border);
    }


    .chat-more-item {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 5px 8px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--color-text);
      font-size: var(--font-size-small);
      cursor: pointer;
      white-space: nowrap;
      text-align: left;
    }

    .chat-more-item:hover {
      background: var(--color-background-hover);
    }

    .psb-menu-divider {
      border-top: 1px solid var(--color-border);
      margin: 4px 0;
    }

    .chat-more-item-danger {
      color: var(--color-error-text);
    }

    .chat-more-item-danger:hover {
      background: color-mix(in srgb, var(--color-error-text) 15%, transparent);
    }


    .chat-more-item .material-symbols-outlined {
      font-size: 14px;
      flex-shrink: 0;
    }


    /* ================================================================
       EMPTY STATE
       ================================================================ */
    .project-sidebar-container .empty-list-message {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100px;
      color: var(--color-secondary);
      text-align: center;
      opacity: 0.7;
      font-style: italic;
    }

    .light-mode .project-sidebar-container .empty-list-message {
      color: var(--color-secondary-light);
    }
  </style>
</body>

</html>
