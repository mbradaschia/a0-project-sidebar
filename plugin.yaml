description: Replaces the default chats list with a project-grouped view (collapsible groups, recency sorting, edit shortcuts, interoperability data attributes). Adds a "branch chat" entry to the chat context menu via a thin in-memory wrapper around the _chat_branching plugin. No disk reads; no new persisted state.
